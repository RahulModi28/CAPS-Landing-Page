                        <div class="flex items-center gap-3">
                                <img src="assets/logo.png" alt="CAPS Logo" class="h-12 w-auto object-contain">
                        </div>
                        <div class="flex items-center gap-4">
                                <nav class="hidden md:flex items-center gap-gutter"><a href="#"
                                                class="text-on-surface-variant dark:text-outline-variant hover:text-secondary hover:bg-secondary/10 px-4 py-2 rounded-lg transition-all duration-200 font-headline-md">Events</a><a

                                </nav>

                                class="absolute bottom-0 right-0 w-64 h-64 bg-tertiary-fixed rounded-full mix-blend-overlay filter blur-3xl opacity-20 pointer-events-none">

                                        </p>

                                                                data-icon="location_on">location_on</span>
